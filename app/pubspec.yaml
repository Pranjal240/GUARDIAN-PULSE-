name: guardian_pulse
description: Guardian Pulse — Real-time Medical Monitoring App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Authentication

  # Firebase
  firebase_core: ^2.32.0
  firebase_database: ^10.5.7
  firebase_messaging: ^14.9.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Charts + Data Viz
  fl_chart: ^0.66.2

  # Location
  geolocator: ^11.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Media
  video_player: ^2.8.1
  image_picker: ^1.0.7

  # Storage / Cache
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Networking
  http: ^1.1.0

  # Permissions
  permission_handler: ^11.3.0

  # UI & Fonts
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  intl: ^0.19.0
  mqtt_client: ^10.11.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/videos/
    - assets/images/


